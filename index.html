<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Action Battle - Shield Pose</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: sans-serif; height: 100vh; overflow: hidden;
        }
        #game_bg { position: fixed; inset: 0; z-index: -1; transition: 0.2s; }
        
        /* ターゲット情報 */
        .enemy-ui { padding: 15px; text-align: center; background: rgba(255,0,0,0.1); border-bottom: 1px solid #400; }
        .bar-outer { width: 90%; height: 8px; background: #222; margin: 5px auto; border-radius: 4px; overflow: hidden; }
        #enemy_hp { width: 100%; height: 100%; background: #f00; transition: 0.3s; }

        /* メインUI */
        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ammo-num { font-size: 7rem; font-weight: 900; line-height: 1; color: #00d4ff; }
        #status_text { font-size: 1.2rem; font-weight: bold; margin-top: 10px; height: 1.5em; color: #ffcc00; }

        /* 自分のHP */
        .my-ui { padding: 15px; background: #111; border-top: 1px solid #333; }
        #my_hp { width: 100%; height: 100%; background: #0f0; transition: 0.3s; }

        /* 攻撃ボタン */
        #trigger {
            width: 100%; height: 40vh; background: #222; border: none; color: #fff;
            font-size: 2rem; font-weight: bold; border-top: 4px solid #444;
        }
        #trigger:active { background: #333; }

        /* ガード演出 */
        .shield-up { background: rgba(0, 150, 255, 0.4) !important; }
        .shield-icon { font-size: 3rem; display: none; margin-bottom: 10px; }

        #setup { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .damaged { background: #600 !important; }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="color:#00d4ff;">BATTLE SETUP</h2>
    <div id="my_id" style="font-size:3rem;">----</div>
    <input type="number" id="target_id" placeholder="相手のID" style="padding:15px; width:200px; text-align:center; border-radius:10px; border:none; background:#222; color:#fff;">
    <button onclick="connect()" style="padding:15px 40px; background:#00d4ff; border:none; border-radius:30px; font-weight:bold;">対戦開始</button>
    <button onclick="startSolo()" style="background:none; color:#555; border:none;">練習モード</button>
</div>

<div id="game_bg"></div>

<div class="enemy-ui">
    <div style="font-size:0.6rem; color:#aaa;">ENEMY HP</div>
    <div class="bar-outer"><div id="enemy_hp"></div></div>
</div>

<div class="main-display">
    <div id="shield_icon" class="shield-icon">🛡️ GUARD</div>
    <div id="ammo_ui" class="ammo-num">8</div>
    <div id="status_text">READY</div>
</div>

<div class="my-ui">
    <div style="font-size:0.6rem; color:#aaa; margin-bottom:4px;">YOUR HP</div>
    <div class="bar-outer"><div id="my_hp"></div></div>
</div>

<button id="trigger">FIRE / 撃つ</button>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {};
    let ammo = 8, myHp = 100, enemyHp = 100;
    let isReloading = false, isGuarding = false, isSolo = false, conn = null;

    const myShortId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myShortId);
    peer.on('open', id => document.getElementById('my_id').innerText = id);
    peer.on('connection', c => { conn = c; setupConn(); hideMenu(); });

    function connect() {
        const id = document.getElementById('target_id').value;
        if(id) { conn = peer.connect(id); setupConn(); isSolo = false; hideMenu(); }
    }
    function startSolo() { isSolo = true; hideMenu(); }
    function hideMenu() { 
        document.getElementById('setup').style.display='none'; 
        audio.resume(); loadSounds(); startSensors(); 
    }

    function setupConn() {
        conn.on('data', data => {
            if(data.type === 'HIT' && !isGuarding) onHit();
            if(data.type === 'SYNC') {
                enemyHp = data.hp;
                document.getElementById('enemy_hp').style.width = enemyHp + "%";
                if(enemyHp <= 0) alert("WIN!");
            }
        });
    }

    // センサー：向きだけで判定
    function startSensors() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().catch(console.error);
        }

        window.addEventListener('deviceorientation', e => {
            const beta = e.beta; // 前後の傾き

            // 1. ガード判定：スマホを立てる (70度〜110度くらい)
            if (beta > 70 && beta < 110 && !isReloading) {
                if (!isGuarding) setGuard(true);
            } else {
                if (isGuarding) setGuard(false);
            }

            // 2. リロード判定：スマホを深く伏せる (20度以下)
            if (beta < 20 && !isReloading && ammo < 8) {
                reload();
            }
        });
    }

    function setGuard(state) {
        isGuarding = state;
        const bg = document.getElementById('game_bg');
        const icon = document.getElementById('shield_icon');
        const trigger = document.getElementById('trigger');
        if(state) {
            bg.classList.add('shield-up');
            icon.style.display = 'block';
            trigger.disabled = true;
            document.getElementById('status_text').innerText = "GUARDING...";
        } else {
            bg.classList.remove('shield-up');
            icon.style.display = 'none';
            trigger.disabled = false;
            document.getElementById('status_text').innerText = isReloading ? "RELOADING" : "READY";
        }
    }

    function reload() {
        isReloading = true;
        document.getElementById('status_text').innerText = "RELOADING...";
        play('reload');
        setTimeout(() => {
            ammo = 8;
            isReloading = false;
            document.getElementById('ammo_ui').innerText = ammo;
            document.getElementById('status_text').innerText = "READY";
            play('ready');
        }, 1200);
    }

    function onHit() {
        myHp -= 10;
        document.getElementById('my_hp').style.width = myHp + "%";
        if(conn) conn.send({type: 'SYNC', hp: myHp});
        document.getElementById('game_bg').classList.add('damaged');
        if(navigator.vibrate) navigator.vibrate(100);
        setTimeout(() => document.getElementById('game_bg').classList.remove('damaged'), 100);
        if(myHp <= 0) alert("GAME OVER");
    }

    async function loadSounds() {
        const f = { shot:'shot.mp3', reload:'reload.mp3', ready:'ready.mp3', empty:'empty.mp3' };
        for(let k in f) {
            try {
                const r = await fetch(f[k]);
                const b = await r.arrayBuffer();
                sounds[k] = await audio.decodeAudioData(b);
            } catch(e) {}
        }
    }

    function play(k) { if(sounds[k]) { const s = audio.createBufferSource(); s.buffer=sounds[k]; s.connect(audio.destination); s.start(0); } }

    document.getElementById('trigger').onclick = () => {
        if(isReloading || isGuarding) return;
        if(ammo > 0) {
            play('shot'); ammo--;
            document.getElementById('ammo_ui').innerText = ammo;
            if(isSolo) {
                enemyHp -= 10;
                document.getElementById('enemy_hp').style.width = enemyHp + "%";
                if(enemyHp <= 0) enemyHp = 100;
            } else if(conn) {
                conn.send({type: 'HIT'});
            }
        } else {
            play('empty');
            document.getElementById('status_text').innerText = "TILT DOWN TO RELOAD";
        }
    };
</script>
</body>
</html>
