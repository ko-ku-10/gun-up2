<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle Gun V3 - Tactical</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0a0a0a; color: white;
            font-family: 'Impact', 'Arial Black', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }
        /* ステータスエリア：新デザイン */
        .status-area {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            border-bottom: 4px solid #007AFF;
        }
        .hp-bar-outer { width: 80%; height: 20px; background: #222; border-radius: 10px; border: 2px solid #444; overflow: hidden; }
        #hp_inner { width: 100%; height: 100%; background: #00ff00; transition: width 0.2s; box-shadow: 0 0 10px #00ff00; }
        .ammo-display { font-size: 5rem; font-weight: bold; color: #007AFF; margin: 5px 0; font-italic: italic; }
        #mode_text { letter-spacing: 2px; color: #ffcc00; font-size: 1rem; }

        /* ボタン：ガード時に見た目が変わるように修正 */
        .control-panel {
            display: grid; grid-template-columns: 1fr 1fr;
            height: 60vh; gap: 15px; padding: 20px;
        }
        button {
            border: none; border-radius: 15px; font-size: 1.5rem; font-weight: bold;
            color: white; cursor: pointer; -webkit-tap-highlight-color: transparent;
            transition: all 0.1s;
        }
        .fire { background: #ff3b30; grid-column: span 2; font-size: 3rem; box-shadow: 0 8px #8b0000; }
        .fire:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 4px #8b0000; }
        
        /* ガード状態（リロード中）の見た目 */
        button:disabled {
            background: #111 !important;
            color: #333 !important;
            box-shadow: none !important;
            transform: translateY(4px);
            border: 1px solid #222;
        }

        .reload { background: #4cd964; }
        .mode { background: #5856d6; }

        /* オーバーレイ */
        #menu {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        .id-box { font-size: 3.5rem; color: #007AFF; font-weight: bold; text-shadow: 0 0 20px #007AFF; }
        input { padding: 15px; font-size: 1.5rem; border-radius: 10px; border: none; text-align: center; background: #222; color: #fff; width: 200px; }
        
        .damaged { animation: hit 0.1s infinite; }
        @keyframes hit { 0% { background: #600; } 100% { background: #0a0a0a; } }
    </style>
</head>
<body>

<div id="menu">
    <div style="font-size:1rem; color:#888;">YOUR ID</div>
    <div id="display_id" class="id-box">----</div>
    <input type="number" id="input_id" placeholder="相手のIDを入力">
    <button onclick="connectPeer()" style="background:#007AFF; padding:15px 40px; border-radius:10px; font-size:1.2rem;">対戦開始</button>
    <button onclick="closeMenu()" style="background:none; color:#555; font-size:1rem;">（1人で練習）</button>
</div>

<div class="status-area">
    <div id="hp_label" style="font-size:0.8rem; margin-bottom:5px;">SYSTEM ONLINE</div>
    <div class="hp-bar-outer"><div id="hp_inner"></div></div>
    <div class="ammo-display" id="ammo_text">12/12</div>
    <div id="mode_text">SEMI-AUTO</div>
</div>

<div class="control-panel">
    <button class="fire" id="btn_fire">FIRE</button>
    <button class="mode" id="btn_mode" onclick="toggleMode()">MODE</button>
    <button class="reload" id="btn_reload" onclick="doReload()">RELOAD</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {};
    let ammo = 12, hp = 100, isFullAuto = false, isReloading = false;
    let connection = null, autoInterval = null;

    const myId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myId);

    peer.on('open', id => document.getElementById('display_id').innerText = id);
    peer.on('connection', conn => { 
        connection = conn; 
        setupConn(); 
        alert("CONNECTED!"); 
        closeMenu(); 
    });

    function connectPeer() {
        const tid = document.getElementById('input_id').value;
        if (tid) { connection = peer.connect(tid); setupConn(); closeMenu(); }
    }

    function setupConn() {
        connection.on('data', data => { if (data === 'HIT') receiveHit(); });
    }

    function closeMenu() {
        audioCtx.resume();
        document.getElementById('menu').style.display = 'none';
        loadSounds();
    }

    function receiveHit() {
        hp -= 10;
        document.getElementById('hp_inner').style.width = Math.max(0, hp) + "%";
        document.body.classList.add('damaged');
        setTimeout(() => document.body.classList.remove('damaged'), 150);
        if (hp <= 0) { alert("TERMINATED"); location.reload(); }
    }

    async function loadSounds() {
        const files = { shot:'shot.mp3', reload:'reload.mp3', ready:'ready.mp3', empty:'empty.mp3' };
        for (let k in files) {
            const res = await fetch(files[k]);
            const buf = await res.arrayBuffer();
            sounds[k] = await audioCtx.decodeAudioData(buf);
        }
    }

    function play(k) {
        if (!sounds[k]) return;
        const s = audioCtx.createBufferSource();
        s.buffer = sounds[k];
        s.connect(audioCtx.destination);
        s.start(0);
    }

    function stopAuto() { clearInterval(autoInterval); autoInterval = null; }

    function fire() {
        if (isReloading) return;
        if (ammo > 0) {
            play('shot');
            ammo--;
            if (connection) connection.send('HIT');
            updateUI();
        } else {
            stopAuto();
            play('empty');
        }
    }

    const fb = document.getElementById('btn_fire');
    fb.addEventListener('pointerdown', e => {
        if (isReloading) return;
        fire();
        if (isFullAuto && ammo > 0) autoInterval = setInterval(fire, 120);
    });
    window.addEventListener('pointerup', stopAuto);

    function toggleMode() {
        if (isReloading) return;
        isFullAuto = !isFullAuto;
        play('ready');
        document.getElementById('mode_text').innerText = isFullAuto ? "FULL-AUTO" : "SEMI-AUTO";
    }

    function doReload() {
        if (isReloading || ammo === 12) return;
        isReloading = true;
        stopAuto();
        
        // 全ボタンをガード（無効化）
        fb.disabled = true;
        document.getElementById('btn_reload').disabled = true;
        document.getElementById('btn_mode').disabled = true;
        document.getElementById('ammo_text').innerText = "---";
        document.getElementById('mode_text').innerText = "RELOADING...";
        
        play('reload');
        setTimeout(() => {
            play('ready');
            ammo = 12;
            isReloading = false;
            // ガード解除
            fb.disabled = false;
            document.getElementById('btn_reload').disabled = false;
            document.getElementById('btn_mode').disabled = false;
            updateUI();
            document.getElementById('mode_text').innerText = isFullAuto ? "FULL-AUTO" : "SEMI-AUTO";
        }, 1200);
    }

    function updateUI() {
        document.getElementById('ammo_text').innerText = ammo + "/12";
    }
</script>
</body>
</html>
