<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Online Battle</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #121212; color: white;
            font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }
        /* ヘッダー・HP・弾数 */
        .header {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #1a1a1a;
            border-bottom: 2px solid #333;
        }
        .hp-label { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .hp-bar-container { width: 80%; height: 25px; background: #333; border-radius: 15px; overflow: hidden; border: 2px solid #444; }
        #hp_bar { width: 100%; height: 100%; background: #2ecc71; transition: width 0.3s; }
        .ammo { font-size: 3.5rem; color: #007AFF; margin: 10px 0; }
        .mode-badge { padding: 5px 15px; background: #444; border-radius: 20px; font-size: 0.9rem; }

        /* 操作ボタン */
        .controls {
            display: grid; grid-template-columns: 1fr 1fr;
            height: 60vh; gap: 10px; padding: 15px; background: #121212;
        }
        button {
            border: none; border-radius: 20px; font-size: 1.2rem; font-weight: bold;
            color: white; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .btn-fire { background: #c0392b; grid-column: span 2; font-size: 2.5rem; box-shadow: 0 6px #8e2a1e; }
        .btn-fire:active { box-shadow: 0 2px #8e2a1e; transform: translateY(4px); }
        .btn-reload { background: #27ae60; }
        .btn-mode { background: #2980b9; }
        
        button:active { opacity: 0.8; }

        /* ID設定・開始画面 */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;
        }
        #start_btn { padding: 15px 40px; font-size: 1.5rem; background: #007AFF; border: none; color: white; border-radius: 50px; cursor: pointer; }
        input { padding: 12px; font-size: 1.2rem; border-radius: 10px; border: none; text-align: center; width: 200px; }
        .id-text { font-size: 1.8rem; color: #f1c40f; font-weight: bold; }

        /* 被弾エフェクト */
        .hit-flash { animation: flash 0.15s; }
        @keyframes flash { from { background: red; } to { background: #121212; } }
    </style>
</head>
<body>

<div id="overlay">
    <h2 style="margin:0;">BATTLE SETUP</h2>
    <div style="color:#888;">あなたのID（4桁の数字）:</div>
    <div id="my_id_display" class="id-text">発行中...</div>
    <hr style="width:70%; border:0.5px solid #333; margin:10px 0;">
    <input type="number" id="opponent_id_input" placeholder="相手のIDを入力">
    <button id="connect_btn" style="background:#27ae60; padding:10px 30px; border-radius:10px; border:none; color:white; font-weight:bold;">相手と接続して開始</button>
    <button id="start_btn">1人で練習（音を有効化）</button>
</div>

<div class="header">
    <div class="hp-label">YOUR HP</div>
    <div class="hp-bar-container"><div id="hp_bar"></div></div>
    <div class="ammo" id="ammo_count">12 / 12</div>
    <div id="mode_display" class="mode-badge">SEMI-AUTO</div>
</div>

<div class="controls">
    <button class="btn-fire" id="fire_btn">FIRE</button>
    <button class="btn-mode" id="mode_btn">MODE</button>
    <button class="btn-reload" id="reload_btn">RELOAD</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buffers = {};
    let ammo = 12;
    let myHP = 100;
    let isAuto = false;
    let conn = null;

    // --- IDを短く (4桁) 設定 ---
    const myShortId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myShortId);

    peer.on('open', (id) => {
        document.getElementById('my_id_display').innerText = id;
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            location.reload(); // IDが被ったら自動リロードで再発行
        }
    });

    // 接続を待ち受ける
    peer.on('connection', (c) => {
        conn = c;
        setupReceiver();
        alert("相手が接続しました！");
        document.getElementById('overlay').style.display = 'none';
        audioCtx.resume();
    });

    // 自分から接続する
    document.getElementById('connect_btn').addEventListener('click', () => {
        const id = document.getElementById('opponent_id_input').value;
        if (id) {
            conn = peer.connect(id);
            setupReceiver();
            document.getElementById('overlay').style.display = 'none';
            audioCtx.resume();
        }
    });

    // データ受信（撃たれた判定）
    function setupReceiver() {
        conn.on('data', (data) => {
            if (data === 'HIT') {
                takeDamage(10); 
            }
        });
    }

    // ダメージ処理
    function takeDamage(dmg) {
        myHP -= dmg;
        if (myHP < 0) myHP = 0;
        document.getElementById('hp_bar').style.width = myHP + "%";
        document.body.classList.add('hit-flash');
        setTimeout(() => document.body.classList.remove('hit-flash'), 150);
        
        if (myHP <= 0) {
            alert("GAME OVER...");
            location.reload();
        }
    }

    // 音声読み込み
    async function loadSound(name, url) {
        try {
            const response = await fetch(url);
            const arrayBuffer = await response.buffer ? await response.buffer() : await response.arrayBuffer();
            buffers[name] = await audioCtx.decodeAudioData(arrayBuffer);
        } catch(e) { console.log(name + "読み込み失敗"); }
    }

    function play(name) {
        if (!buffers[name]) return;
        const source = audioCtx.createBufferSource();
        source.buffer = buffers[name];
        source.connect(audioCtx.destination);
        source.start(0);
    }

    // 初期化（音源ロード）
    document.getElementById('start_btn').addEventListener('click', async () => {
        audioCtx.resume();
        document.getElementById('start_btn').innerText = "LOADING...";
        await Promise.all([
            loadSound('shot', 'shot.mp3'),
            loadSound('reload', 'reload.mp3'),
            loadSound('ready', 'ready.mp3'),
            loadSound('empty', 'empty.mp3')
        ]);
        document.getElementById('overlay').style.display = 'none';
    });

    // 発射
    function fire() {
        if (ammo > 0) {
            play('shot');
            ammo--;
            if (conn && conn.open) conn.send('HIT');
            updateUI();
        } else {
            play('empty');
        }
    }

    // 連射ロジック
    const fireBtn = document.getElementById('fire_btn');
    let timer = null;
    fireBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        fire();
        if (isAuto) timer = setInterval(fire, 150);
    });
    window.addEventListener('pointerup', () => { clearInterval(timer); });

    // モード切替
    document.getElementById('mode_btn').addEventListener('click', () => {
        isAuto = !isAuto;
        play('ready');
        document.getElementById('mode_display').innerText = isAuto ? "FULL-AUTO" : "SEMI-AUTO";
    });

    // リロード
    document.getElementById('reload_btn').addEventListener('click', () => {
        play('reload');
        setTimeout(() => {
            play('ready');
            ammo = 12;
            updateUI();
        }, 1000);
    });

    function updateUI() {
        document.getElementById('ammo_count').innerText = ammo + " / 12";
    }
</script>
</body>
</html>
