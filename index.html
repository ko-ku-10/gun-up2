<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Battle JP/EN</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050505; color: white;
            font-family: 'Helvetica Neue', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }

        /* 相手のステータス（画面上部） */
        .enemy-status {
            padding: 10px; background: rgba(255, 0, 0, 0.1);
            border-bottom: 2px solid #500; text-align: center;
        }
        
        /* 自分のステータス（画面中央） */
        .main-display {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #000;
        }

        /* ゲージ共通設定 */
        .bar-label { font-size: 0.75rem; font-weight: bold; margin-bottom: 3px; letter-spacing: 1px; }
        .bar-outer { width: 85%; height: 14px; background: #222; border-radius: 7px; overflow: hidden; border: 1px solid #444; margin-bottom: 10px; }
        .bar-inner { width: 100%; height: 100%; transition: width 0.2s; }
        
        #enemy_hp_bar { background: #ff3b30; box-shadow: 0 0 10px #f00; }
        #my_hp_bar { background: #4cd964; box-shadow: 0 0 10px #0f0; }
        #shield_bar { background: #007AFF; box-shadow: 0 0 10px #007AFF; }

        .ammo-count { font-size: 5rem; font-weight: 900; color: #fff; margin: 0; line-height: 1; }
        .ammo-label { font-size: 0.8rem; color: #007AFF; font-weight: bold; }

        /* ボタンエリア */
        .action-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            height: 45vh; gap: 12px; padding: 15px; background: #111;
        }
        button {
            border: none; border-radius: 12px; font-size: 1.4rem; font-weight: bold;
            color: white; cursor: pointer; -webkit-tap-highlight-color: transparent;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        button span { font-size: 0.7rem; opacity: 0.7; margin-top: 4px; }

        .fire { background: #d32f2f; grid-column: span 2; font-size: 2.5rem; }
        .guard { background: #0277bd; }
        .reload { background: #2e7d32; }

        /* 状態変化 */
        button:disabled { opacity: 0.1; filter: grayscale(1); }
        .guard-active { background: #00f2ff !important; color: #000; box-shadow: inset 0 0 20px #fff; }
        
        #result_screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        #setup { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .damaged { animation: flash 0.1s infinite; }
        @keyframes flash { 0% { background: #400; } 100% { background: #000; } }
    </style>
</head>
<body>

<div id="setup">
    <div style="color:#007AFF; font-weight:bold;">YOUR ID</div>
    <div id="my_id" style="font-size:4rem; font-weight:900;">----</div>
    <input type="number" id="target_id" placeholder="相手のIDを入力" style="padding:15px; background:#222; border:1px solid #444; color:white; text-align:center; font-size:1.5rem; width:220px; border-radius:10px;">
    <button onclick="connect()" style="background:#007AFF; color:white; padding:15px 50px; border-radius:50px; font-size:1.2rem;">BATTLE START</button>
</div>

<div id="result_screen">
    <h1 id="result_msg" style="font-size:5rem; margin:0;">WIN</h1>
    <p id="result_sub" style="color:#888; margin-bottom:30px;">対戦終了</p>
    <button onclick="location.reload()" style="padding:15px 40px; background:#333; border-radius:30px;">RETRY (再挑戦)</button>
</div>

<div class="enemy-status">
    <div class="bar-label">ENEMY HP <span style="font-weight:normal;">(相手の体力)</span></div>
    <div class="bar-outer" style="margin:0 auto;"><div id="enemy_hp_bar" class="bar-inner"></div></div>
</div>

<div class="main-display">
    <div class="ammo-label">AMMO (残弾数)</div>
    <div class="ammo-count" id="ammo_ui">12</div>
    
    <div class="bar-label" style="margin-top:20px;">YOUR HP <span style="font-weight:normal;">(自分の体力)</span></div>
    <div class="bar-outer"><div id="my_hp_bar" class="bar-inner"></div></div>
    
    <div class="bar-label">SHIELD <span style="font-weight:normal;">(防護エネルギー)</span></div>
    <div class="bar-outer"><div id="shield_bar" class="bar-inner"></div></div>
</div>

<div class="action-grid">
    <button class="fire" id="btn_fire">FIRE<span>攻撃</span></button>
    <button class="guard" id="btn_guard">GUARD<span>防御</span></button>
    <button class="reload" onclick="reload()">RELOAD<span>装填</span></button>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {};
    let ammo = 12, myHp = 100, enemyHp = 100, shield = 100;
    let isReloading = false, isGuarding = false, shieldBroken = false;
    let conn = null;

    const myId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myId);
    peer.on('open', id => document.getElementById('my_id').innerText = id);
    peer.on('connection', c => { conn = c; setupConn(); hideMenu(); });

    function connect() {
        const id = document.getElementById('target_id').value;
        if(id) { conn = peer.connect(id); setupConn(); hideMenu(); }
    }

    function setupConn() {
        conn.on('data', data => {
            if(data.type === 'HIT') onHit();
            if(data.type === 'HP_SYNC') {
                enemyHp = data.val;
                document.getElementById('enemy_hp_bar').style.width = enemyHp + "%";
                if(enemyHp <= 0) showResult("WIN", "勝利！");
            }
        });
    }

    function hideMenu() { audio.resume(); document.getElementById('setup').style.display='none'; loadSounds(); syncHp(); }

    function syncHp() { if(conn && conn.open) conn.send({type: 'HP_SYNC', val: myHp}); }

    function onHit() {
        if(isGuarding && shield > 0) return;
        myHp -= 10;
        document.getElementById('my_hp_bar').style.width = Math.max(0, myHp) + "%";
        syncHp();
        document.body.classList.add('damaged');
        if(navigator.vibrate) navigator.vibrate(50);
        setTimeout(() => document.body.classList.remove('damaged'), 100);
        if(myHp <= 0) showResult("LOSE", "敗北...");
    }

    function showResult(msg, sub) {
        document.getElementById('result_msg').innerText = msg;
        document.getElementById('result_sub').innerText = sub;
        document.getElementById('result_screen').style.display = 'flex';
    }

    async function loadSounds() {
        const f = { shot:'shot.mp3', reload:'reload.mp3', ready:'ready.mp3', empty:'empty.mp3' };
        for(let k in f) {
            const r = await fetch(f[k]);
            const b = await r.arrayBuffer();
            sounds[k] = await audio.decodeAudioData(b);
        }
    }

    function play(k) { if(sounds[k]) { const s = audio.createBufferSource(); s.buffer=sounds[k]; s.connect(audio.destination); s.start(0); } }

    function fire() {
        if(isReloading || isGuarding) return;
        if(ammo > 0) {
            play('shot'); ammo--;
            if(conn) conn.send({type: 'HIT'});
            updateUI();
        } else { play('empty'); }
    }

    const fb = document.getElementById('btn_fire');
    fb.onclick = fire;

    const gb = document.getElementById('btn_guard');
    setInterval(() => {
        if(isGuarding && shield > 0) {
            shield -= 2.5;
            if(shield <= 0) { shield = 0; stopGuard(); shieldBroken = true; setTimeout(()=>shieldBroken=false, 3000); }
        } else if(!isGuarding && shield < 100) {
            shield += 1.2;
        }
        document.getElementById('shield_bar').style.width = shield + "%";
        gb.disabled = shieldBroken || isReloading;
        if(shieldBroken) document.getElementById('shield_bar').style.background = "#ffaa00";
        else document.getElementById('shield_bar').style.background = "#007AFF";
    }, 50);

    gb.onpointerdown = () => { if(!shieldBroken && !isReloading) { isGuarding = true; gb.classList.add('guard-active'); fb.disabled = true; } };
    const stopGuard = () => { isGuarding = false; gb.classList.remove('guard-active'); fb.disabled = false; };
    gb.onpointerup = stopGuard;
    gb.onpointerleave = stopGuard;

    function reload() {
        if(isReloading || ammo === 12) return;
        isReloading = true; stopGuard();
        fb.disabled = gb.disabled = true;
        play('reload');
        setTimeout(() => {
            play('ready'); ammo = 12; isReloading = false;
            fb.disabled = gb.disabled = false; updateUI();
        }, 1000);
    }

    function updateUI() { document.getElementById('ammo_ui').innerText = ammo; }
</script>
</body>
</html>
