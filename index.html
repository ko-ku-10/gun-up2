<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physical Action Battle</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background: #000; color: #fff;
            font-family: 'Avenir', sans-serif; height: 100vh; overflow: hidden;
        }
        /* バトル中の背景演出 */
        #game_bg {
            position: fixed; inset: 0; transition: background 0.1s; z-index: -1;
        }

        /* 相手のHP（ターゲット） */
        .enemy-ui { padding: 20px; text-align: center; background: rgba(255,0,0,0.2); border-bottom: 2px solid #f00; }
        .bar-outer { width: 90%; height: 10px; background: #333; margin: 10px auto; border-radius: 5px; overflow: hidden; }
        #enemy_hp { width: 100%; height: 100%; background: #f00; transition: width 0.3s; }

        /* メインUI */
        .main-ui { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .ammo-display { font-size: 6rem; font-weight: bold; font-italic: italic; color: #00d4ff; text-shadow: 0 0 20px #00d4ff; }
        .hint-msg { font-size: 1rem; color: #ffcc00; margin-top: 10px; text-align: center; height: 1.5em; }

        /* 自分のHPとシールド */
        .my-status { padding: 20px; background: #111; }
        #my_hp { width: 100%; height: 100%; background: #0f0; transition: width 0.3s; }
        #shield_status { font-size: 0.8rem; color: #00d4ff; text-align: center; margin-top: 5px; }

        /* 巨大な発射ボタン */
        #trigger {
            width: 100%; height: 40vh; background: linear-gradient(to bottom, #444, #222);
            border: none; color: #fff; font-size: 2rem; font-weight: bold;
            border-top: 4px solid #555; active { background: #666; }
        }

        /* 設定画面 */
        #setup { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        input { padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 10px; width: 200px; text-align: center; }
        
        /* 演出用クラス */
        .damaged { background: #f00 !important; }
        .reloading { color: #f9a825 !important; }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="margin:0;">PHYSICAL BATTLE</h2>
    <div id="my_id" style="font-size:3rem; color:#00d4ff;">----</div>
    <input type="number" id="target_id" placeholder="OPPONENT ID">
    <button onclick="connect()" style="background:#00d4ff; padding:15px 40px; border:none; border-radius:50px; font-weight:bold;">LINK START</button>
    <button onclick="startSolo()" style="background:none; color:#555; border:none;">SOLO PRACTICE</button>
    <p style="font-size:0.7rem; color:#888;">※センサー利用の許可が必要です</p>
</div>

<div id="game_bg"></div>

<div class="enemy-ui">
    <div style="font-size:0.7rem;">ENEMY / TARGET</div>
    <div class="bar-outer"><div id="enemy_hp"></div></div>
</div>

<div class="main-ui">
    <div id="ammo_text" class="ammo-display">8</div>
    <div id="hint" class="hint-msg">READY</div>
</div>

<div class="my-status">
    <div style="font-size:0.7rem; margin-bottom:5px;">YOUR HEALTH</div>
    <div class="bar-outer"><div id="my_hp"></div></div>
    <div id="shield_status">SHIELD: READY</div>
</div>

<button id="trigger">TRIGGER / 射撃</button>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {};
    let ammo = 8, myHp = 100, enemyHp = 100;
    let isReloading = false, isShielding = false, isSolo = false, conn = null;

    // PeerJS Setup
    const myShortId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myShortId);
    peer.on('open', id => document.getElementById('my_id').innerText = id);
    peer.on('connection', c => { conn = c; setupConn(); hideMenu(); });

    function connect() {
        const id = document.getElementById('target_id').value;
        if(id) { conn = peer.connect(id); setupConn(); isSolo = false; hideMenu(); }
    }

    function startSolo() { isSolo = true; hideMenu(); }

    function hideMenu() {
        document.getElementById('setup').style.display = 'none';
        audio.resume();
        loadSounds();
        requestSensors(); // センサー開始
    }

    function setupConn() {
        conn.on('data', data => {
            if(data.type === 'HIT' && !isShielding) onHit();
            if(data.type === 'SYNC_HP') {
                enemyHp = data.val;
                document.getElementById('enemy_hp').style.width = enemyHp + "%";
                if(enemyHp <= 0) alert("WIN!");
            }
        });
    }

    // 物理アクション：センサー処理
    function requestSensors() {
        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().catch(console.error);
        }

        window.addEventListener('deviceorientation', e => {
            // リロード動作：スマホを60度以上下に傾ける
            if (e.beta > 70 && !isReloading && ammo < 8) {
                doReload();
            }
        });

        let lastShake = 0;
        window.addEventListener('devicemotion', e => {
            // 回避動作：スマホを強く振る
            const acc = e.accelerationIncludingGravity;
            const totalAcc = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
            if (totalAcc > 30 && !isShielding && !isReloading) {
                activateShield();
            }
        });
    }

    function doReload() {
        isReloading = true;
        document.getElementById('hint').innerText = "RELOADING...";
        document.getElementById('ammo_text').classList.add('reloading');
        play('reload');
        setTimeout(() => {
            ammo = 8;
            isReloading = false;
            document.getElementById('hint').innerText = "READY";
            document.getElementById('ammo_text').classList.remove('reloading');
            document.getElementById('ammo_text').innerText = ammo;
            play('ready');
        }, 1500);
    }

    function activateShield() {
        isShielding = true;
        document.getElementById('shield_status').innerText = "SHIELD ACTIVE!";
        document.getElementById('game_bg').style.background = "rgba(0, 212, 255, 0.3)";
        setTimeout(() => {
            isShielding = false;
            document.getElementById('shield_status').innerText = "SHIELD: RECHARGING";
            document.getElementById('game_bg').style.background = "transparent";
            setTimeout(() => { document.getElementById('shield_status').innerText = "SHIELD: READY"; }, 3000);
        }, 800);
    }

    function onHit() {
        myHp -= 10;
        document.getElementById('my_hp').style.width = myHp + "%";
        if(conn) conn.send({type: 'SYNC_HP', val: myHp});
        document.getElementById('game_bg').classList.add('damaged');
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        setTimeout(() => document.getElementById('game_bg').classList.remove('damaged'), 100);
        if(myHp <= 0) alert("GAMEOVER");
    }

    async function loadSounds() {
        const f = { shot:'shot.mp3', reload:'reload.mp3', ready:'ready.mp3', empty:'empty.mp3' };
        for(let k in f) {
            try {
                const r = await fetch(f[k]);
                const b = await r.arrayBuffer();
                sounds[k] = await audio.decodeAudioData(b);
            } catch(e) {}
        }
    }

    function play(k) { if(sounds[k]) { const s = audio.createBufferSource(); s.buffer=sounds[k]; s.connect(audio.destination); s.start(0); } }

    document.getElementById('trigger').onclick = () => {
        if(isReloading || isShielding) return;
        if(ammo > 0) {
            play('shot'); ammo--;
            document.getElementById('ammo_text').innerText = ammo;
            if(isSolo) {
                enemyHp -= 10;
                document.getElementById('enemy_hp').style.width = enemyHp + "%";
                if(enemyHp <= 0) { enemyHp = 100; document.getElementById('enemy_hp').style.width = "100%"; }
            } else if(conn) {
                conn.send({type: 'HIT'});
            }
        } else {
            play('empty');
            document.getElementById('hint').innerText = "TILT DOWN TO RELOAD";
        }
    };
</script>
</body>
</html>
