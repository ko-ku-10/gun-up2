<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Motion Battle V7</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; height: 100vh; overflow: hidden; }
        #game_bg { position: fixed; inset: 0; z-index: -1; transition: 0.2s; }
        
        .enemy-ui { padding: 10px; text-align: center; background: rgba(255,0,0,0.1); border-bottom: 2px solid #500; }
        .bar-outer { width: 90%; height: 10px; background: #222; margin: 5px auto; border-radius: 5px; overflow: hidden; }
        #enemy_hp { width: 100%; height: 100%; background: #f00; transition: 0.3s; }

        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .weapon-name { font-size: 1.2rem; color: #aaa; margin-bottom: 5px; letter-spacing: 2px; }
        .ammo-num { font-size: 7rem; font-weight: 900; line-height: 1; color: #00d4ff; text-shadow: 0 0 20px rgba(0,212,255,0.5); }
        #status_text { font-size: 1.2rem; font-weight: bold; margin: 10px 0; color: #ffcc00; height: 1.5em; }

        .control-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; background: #111; }
        button { border: none; color: #fff; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; border-radius: 5px; }
        
        .mode-btn { background: #333; padding: 15px; font-size: 0.8rem; border: 1px solid #444; }
        .mode-active { background: #007AFF; border-color: #00d4ff; }
        
        #trigger { width: 100%; height: 30vh; background: #c62828; font-size: 2.5rem; border-top: 5px solid #b71c1c; grid-column: span 2; margin-top: 5px; }
        #trigger:active { background: #e53935; }

        .shield-active { background: rgba(0, 150, 255, 0.4) !important; box-shadow: inset 0 0 100px #00d4ff; }
        .damaged { background: #900 !important; }
        
        #setup { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color:#00d4ff">TACTICAL CORE</h1>
    <div id="my_id" style="font-size:3.5rem; font-weight:900;">----</div>
    <input type="number" id="target_id" placeholder="OPPONENT ID" style="padding:15px; width:200px; text-align:center; border-radius:5px; border:1px solid #00d4ff; background:#111; color:#fff;">
    <button onclick="connect()" style="padding:15px 40px; background:#00d4ff; border-radius:30px; font-weight:bold; color:#000;">BATTLE START</button>
    <button onclick="startSolo()" style="background:none; color:#555; border:none;">SOLO PRACTICE</button>
</div>

<div id="game_bg"></div>
<div class="enemy-ui"><div class="bar-outer"><div id="enemy_hp"></div></div></div>

<div class="main-display">
    <div id="weapon_label" class="weapon-name">PISTOL</div>
    <div id="ammo_ui" class="ammo-num">12</div>
    <div id="status_text">READY</div>
</div>

<div class="control-panel">
    <button id="btn_mode" class="mode-btn" onclick="toggleFireMode()">MODE: SEMI</button>
    <button id="btn_swap" class="mode-btn" onclick="swapWeapon()">SWAP WEAPON</button>
    <button id="trigger">FIRE</button>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {};
    const weapons = {
        pistol: { name: "PISTOL", max: 12, reloadTime: 800, damage: 15, sound: 'pistol_shot' },
        rifle: { name: "RIFLE", max: 30, reloadTime: 2000, damage: 10, sound: 'rifle_shot' }
    };

    let currentWeapon = 'pistol';
    let ammo = weapons.pistol.max;
    let myHp = 100, enemyHp = 100;
    let isReloading = false, isGuarding = false, isSolo = false, conn = null;
    let fireMode = 'SEMI';
    let autoFireInterval = null;

    const myShortId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myShortId);
    peer.on('open', id => document.getElementById('my_id').innerText = id);
    peer.on('connection', c => { conn = c; setupConn(); hideMenu(); });

    function connect() {
        const id = document.getElementById('target_id').value;
        if(id) { conn = peer.connect(id); setupConn(); hideMenu(); }
    }
    function startSolo() { isSolo = true; hideMenu(); }
    function hideMenu() { document.getElementById('setup').style.display='none'; audio.resume(); loadSounds(); startSensors(); }

    function setupConn() {
        conn.on('data', data => {
            if(data.type === 'HIT' && !isGuarding) onHit(data.dmg);
            if(data.type === 'SYNC') {
                enemyHp = data.hp;
                document.getElementById('enemy_hp').style.width = enemyHp + "%";
                if(enemyHp <= 0) alert("WIN");
            }
        });
    }

    function startSensors() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().catch(console.error);
        }
        window.addEventListener('deviceorientation', e => {
            const beta = e.beta; 
            if (Math.abs(beta) > 75 && Math.abs(beta) < 105 && !isReloading) {
                if (!isGuarding) setGuard(true);
            } else {
                if (isGuarding) setGuard(false);
            }
            if (Math.abs(beta) > 160 && !isReloading && !isGuarding && ammo < weapons[currentWeapon].max) {
                doReload();
            }
        });
    }

    function toggleFireMode() {
        fireMode = (fireMode === 'SEMI') ? 'AUTO' : 'SEMI';
        const btn = document.getElementById('btn_mode');
        btn.innerText = "MODE: " + fireMode;
        btn.classList.toggle('mode-active', fireMode === 'AUTO');
    }

    function swapWeapon() {
        if (isReloading) return;
        stopAutoFire();
        currentWeapon = (currentWeapon === 'pistol') ? 'rifle' : 'pistol';
        ammo = weapons[currentWeapon].max;
        document.getElementById('weapon_label').innerText = weapons[currentWeapon].name;
        document.getElementById('ammo_ui').innerText = ammo;
        play('ready');
    }

    function setGuard(state) {
        isGuarding = state;
        document.getElementById('game_bg').className = state ? 'shield-active' : '';
        document.getElementById('status_text').innerText = state ? "🛡️ GUARD" : "READY";
        if(state) stopAutoFire();
    }

    function doReload() {
        if(isReloading) return;
        isReloading = true;
        stopAutoFire();
        document.getElementById('status_text').innerText = "🔄 RELOADING...";
        play('reload');
        setTimeout(() => {
            ammo = weapons[currentWeapon].max;
            isReloading = false;
            document.getElementById('ammo_ui').innerText = ammo;
            document.getElementById('status_text').innerText = "READY";
            play('ready');
        }, weapons[currentWeapon].reloadTime);
    }

    function onHit(dmg) {
        myHp -= dmg;
        document.getElementById('game_bg').classList.add('damaged');
        if(conn) conn.send({type: 'SYNC', hp: myHp});
        if(navigator.vibrate) navigator.vibrate(50);
        setTimeout(() => document.getElementById('game_bg').classList.remove('damaged'), 100);
        if(myHp <= 0) alert("LOSE");
    }

    function fire() {
        if(isReloading || isGuarding) return;
        if(ammo > 0) {
            play(weapons[currentWeapon].sound); // 武器ごとの音を再生
            ammo--;
            document.getElementById('ammo_ui').innerText = ammo;
            const dmg = weapons[currentWeapon].damage;
            if(isSolo) {
                enemyHp -= dmg;
                document.getElementById('enemy_hp').style.width = enemyHp + "%";
                if(enemyHp <= 0) enemyHp = 100;
            } else if(conn) {
                conn.send({type: 'HIT', dmg: dmg});
            }
        } else {
            play('empty');
            stopAutoFire();
        }
    }

    const trigger = document.getElementById('trigger');
    trigger.onpointerdown = (e) => {
        e.preventDefault();
        if(fireMode === 'SEMI') {
            fire();
        } else {
            fire();
            autoFireInterval = setInterval(fire, 120); 
        }
    };
    const stopAutoFire = () => { clearInterval(autoFireInterval); autoFireInterval = null; };
    trigger.onpointerup = stopAutoFire;
    trigger.onpointerleave = stopAutoFire;

    async function loadSounds() {
        // 読み込む音源ファイルリスト
        const files = { 
            pistol_shot: 'pistol_shot.mp3', 
            rifle_shot: 'rifle_shot.mp3', 
            reload: 'reload.mp3', 
            ready: 'ready.mp3', 
            empty: 'empty.mp3' 
        };
        for(let k in files) {
            try {
                const r = await fetch(files[k]);
                const b = await r.arrayBuffer();
                sounds[k] = await audio.decodeAudioData(b);
            } catch(e) { console.log("Sound load error: " + k); }
        }
    }

    function play(k) { 
        if(sounds[k]) { 
            const s = audio.createBufferSource(); 
            s.buffer = sounds[k]; 
            s.connect(audio.destination); 
            s.start(0); 
        } 
    }
</script>
</body>
</html>
