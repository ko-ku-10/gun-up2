<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Battle Online V4</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #050505; color: white;
            font-family: 'Courier New', sans-serif; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; user-select: none;
        }
        /* ステータスセクション */
        .status-header {
            flex: 1.5; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: #000;
            border-bottom: 2px solid #333;
        }
        .bar-label { font-size: 0.7rem; color: #888; margin-top: 5px; }
        .bar-outer { width: 80%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
        #my_hp_bar { width: 100%; height: 100%; background: #00ff00; transition: width 0.2s; }
        #enemy_hp_bar { width: 100%; height: 100%; background: #ff3b30; transition: width 0.2s; }
        #shield_bar { width: 100%; height: 100%; background: #00aaff; transition: width 0.1s; }
        
        .ammo-text { font-size: 3.5rem; font-weight: bold; color: #00d4ff; margin: 5px 0; }
        
        /* バトルボタンエリア */
        .battle-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            height: 50vh; gap: 10px; padding: 15px;
        }
        button {
            border: 2px solid #444; border-radius: 12px; font-size: 1.2rem; font-weight: bold;
            color: white; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .fire { background: #600; grid-column: span 2; font-size: 2.2rem; border-color: #900; }
        .guard { background: #003344; border-color: #00aaff; }
        .reload { background: #004411; border-color: #00ff66; }
        
        /* 特殊状態 */
        button:disabled { opacity: 0.1; background: #111 !important; }
        .guard-active { background: #00aaff !important; box-shadow: 0 0 15px #00aaff; color: #000; }
        .shield-broken { border-color: #ffaa00 !important; opacity: 0.5; }

        /* 結果画面 */
        #result_screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }

        #setup { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        .damaged { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { background: #300; } 100% { background: #000; } }
    </style>
</head>
<body>

<div id="setup">
    <div id="my_id" style="font-size:3rem; color:#00d4ff;">----</div>
    <input type="number" id="target_id" placeholder="相手のIDを入力" style="padding:15px; background:#111; border:1px solid #00d4ff; color:white; text-align:center; font-size:1.2rem; width:200px;">
    <button onclick="connect()" style="background:#00d4ff; color:#000; padding:10px 40px; border:none; border-radius:10px; font-weight:bold;">CONNECT</button>
</div>

<div id="result_screen">
    <h1 id="result_msg" style="font-size:4rem;">WIN</h1>
    <button onclick="location.reload()" style="padding:15px 30px; background:#444; border:none; color:white;">RETRY</button>
</div>

<div class="status-header">
    <div class="bar-label">ENEMY HP</div>
    <div class="bar-outer"><div id="enemy_hp_bar"></div></div>
    <div class="ammo-text" id="ammo_ui">12/12</div>
    <div class="bar-label">YOUR HP</div>
    <div class="bar-outer"><div id="my_hp_bar"></div></div>
    <div class="bar-label">SHIELD STAMINA</div>
    <div class="bar-outer"><div id="shield_bar"></div></div>
</div>

<div class="battle-grid">
    <button class="fire" id="btn_fire">FIRE</button>
    <button class="guard" id="btn_guard">GUARD</button>
    <button class="reload" id="btn_reload" onclick="reload()">RELOAD</button>
</div>

<script>
    const audio = new (window.AudioContext || window.webkitAudioContext)();
    const sounds = {};
    let ammo = 12, myHp = 100, enemyHp = 100, shield = 100;
    let isReloading = false, isGuarding = false, shieldBroken = false;
    let conn = null, autoTimer = null;

    const myId = Math.floor(1000 + Math.random() * 9000).toString();
    const peer = new Peer(myId);
    peer.on('open', id => document.getElementById('my_id').innerText = id);
    peer.on('connection', c => { conn = c; setupConn(); hideMenu(); });

    function connect() {
        const id = document.getElementById('target_id').value;
        if(id) { conn = peer.connect(id); setupConn(); hideMenu(); }
    }

    function setupConn() {
        conn.on('data', data => {
            if(data.type === 'HIT') onHit();
            if(data.type === 'HP_SYNC') updateEnemyHp(data.val);
        });
    }

    function hideMenu() { audio.resume(); document.getElementById('setup').style.display='none'; loadSounds(); syncHp(); }

    function updateEnemyHp(val) {
        enemyHp = val;
        document.getElementById('enemy_hp_bar').style.width = enemyHp + "%";
        if(enemyHp <= 0) showResult("YOU WIN");
    }

    function syncHp() {
        if(conn && conn.open) conn.send({type: 'HP_SYNC', val: myHp});
    }

    function onHit() {
        if(isGuarding && shield > 0) return; // ガード成功
        myHp -= 10;
        document.getElementById('my_hp_bar').style.width = Math.max(0, myHp) + "%";
        syncHp();
        document.body.classList.add('damaged');
        setTimeout(() => document.body.classList.remove('damaged'), 100);
        if(myHp <= 0) showResult("YOU LOSE");
    }

    function showResult(msg) {
        document.getElementById('result_msg').innerText = msg;
        document.getElementById('result_screen').style.display = 'flex';
    }

    async function loadSounds() {
        const f = { shot:'shot.mp3', reload:'reload.mp3', ready:'ready.mp3', empty:'empty.mp3' };
        for(let k in f) {
            const r = await fetch(f[k]);
            const b = await r.arrayBuffer();
            sounds[k] = await audio.decodeAudioData(b);
        }
    }

    function play(k) { if(sounds[k]) { const s = audio.createBufferSource(); s.buffer=sounds[k]; s.connect(audio.destination); s.start(0); } }

    function fire() {
        if(isReloading || isGuarding) return;
        if(ammo > 0) {
            play('shot');
            ammo--;
            if(conn) conn.send({type: 'HIT'});
            updateUI();
        } else {
            play('empty');
        }
    }

    // FIREボタン（単発のみに簡略化してバグ防止）
    const fb = document.getElementById('btn_fire');
    fb.onclick = fire;

    // GUARDボタンとスタミナ
    const gb = document.getElementById('btn_guard');
    setInterval(() => {
        if(isGuarding && shield > 0) {
            shield -= 2; // ガード中の消費
            if(shield <= 0) { shield = 0; stopGuard(); shieldBroken = true; setTimeout(()=>shieldBroken=false, 3000); }
        } else if(!isGuarding && shield < 100) {
            shield += 1; // 回復
        }
        document.getElementById('shield_bar').style.width = shield + "%";
        gb.disabled = shieldBroken;
    }, 50);

    gb.onpointerdown = () => { if(!shieldBroken && !isReloading) { isGuarding = true; gb.classList.add('guard-active'); fb.disabled = true; } };
    const stopGuard = () => { isGuarding = false; gb.classList.remove('guard-active'); fb.disabled = false; };
    gb.onpointerup = stopGuard;
    gb.onpointerleave = stopGuard;

    function reload() {
        if(isReloading || ammo === 12) return;
        isReloading = true;
        fb.disabled = gb.disabled = true;
        play('reload');
        setTimeout(() => {
            play('ready');
            ammo = 12; isReloading = false;
            fb.disabled = gb.disabled = false;
            updateUI();
        }, 1000);
    }

    function updateUI() { document.getElementById('ammo_ui').innerText = ammo + "/12"; }
</script>
</body>
</html>
